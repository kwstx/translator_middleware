# =============================================================================
# Popular Apps Catalog — Seed Data
#
# Pre-baked dual wrappers (MCP + CLI) for well-known services.
# These entries warm the registry cache so first-time discovery is instant.
# The universal auto-generation + self-healing loop still validates them.
#
# To add a new entry, append to the list below. Community submissions
# via the /catalog/submit endpoint are the preferred path for additions.
# =============================================================================

entries:
  # ---- Developer Tools ----

  - slug: github
    display_name: GitHub
    description: GitHub REST API - repositories, issues, pull requests, actions
    category: developer
    tags: [git, vcs, ci-cd, issues]
    openapi_url: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.json
    auth_hint:
      type: bearer_token
      env_var: GITHUB_TOKEN
      docs_url: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
    mcp_definition:
      name: github
      description: Interact with GitHub repositories, issues and pull requests
      inputSchema:
        type: object
        properties:
          action:
            type: string
            enum: [list_repos, get_repo, create_issue, list_issues, create_pr, list_prs, get_actions_runs]
          owner:
            type: string
          repo:
            type: string
          params:
            type: object
        required: [action]
    cli_command: "gh"
    cli_wrapper_script: |
      #!/usr/bin/env python
      import os, subprocess, sys, json
      def run():
          token = os.environ.get("GITHUB_TOKEN", "")
          cmd = ["gh"] + sys.argv[1:]
          env = {**os.environ, "GH_TOKEN": token}
          result = subprocess.run(cmd, capture_output=True, text=True, env=env)
          print(json.dumps({"stdout": result.stdout, "stderr": result.stderr, "code": result.returncode}))
      if __name__ == "__main__":
          run()

  - slug: slack
    display_name: Slack
    description: Slack Web API - messages, channels, users, reactions
    category: communication
    tags: [chat, messaging, team]
    openapi_url: https://raw.githubusercontent.com/slackapi/slack-api-specs/master/web-api/slack_web_openapi_v2.json
    auth_hint:
      type: bearer_token
      env_var: SLACK_API_TOKEN
      docs_url: https://api.slack.com/authentication/token-types
    mcp_definition:
      name: slack
      description: Send messages, manage channels, and interact with Slack workspaces
      inputSchema:
        type: object
        properties:
          action:
            type: string
            enum: [post_message, list_channels, list_users, add_reaction, upload_file]
          channel:
            type: string
          text:
            type: string
          params:
            type: object
        required: [action]
    cli_command: null
    cli_wrapper_script: |
      #!/usr/bin/env python
      import os, sys, json, urllib.request, urllib.parse
      def run():
          token = os.environ.get("SLACK_API_TOKEN", "")
          method = sys.argv[1] if len(sys.argv) > 1 else "api.test"
          payload = json.loads(sys.argv[2]) if len(sys.argv) > 2 else {}
          url = f"https://slack.com/api/{method}"
          data = urllib.parse.urlencode(payload).encode()
          req = urllib.request.Request(url, data=data, headers={"Authorization": f"Bearer {token}"})
          with urllib.request.urlopen(req) as resp:
              print(resp.read().decode())
      if __name__ == "__main__":
          run()

  - slug: stripe
    display_name: Stripe
    description: Stripe API - payments, customers, subscriptions, invoices
    category: fintech
    tags: [payments, billing, subscriptions]
    openapi_url: https://raw.githubusercontent.com/stripe/openapi/master/openapi/spec3.json
    auth_hint:
      type: bearer_token
      env_var: STRIPE_SECRET_KEY
      docs_url: https://stripe.com/docs/api/authentication
    mcp_definition:
      name: stripe
      description: Manage Stripe payments, customers, and subscriptions
      inputSchema:
        type: object
        properties:
          action:
            type: string
            enum: [list_customers, create_customer, create_charge, list_charges, list_subscriptions]
          params:
            type: object
        required: [action]
    cli_command: "stripe"
    cli_wrapper_script: |
      #!/usr/bin/env python
      import os, subprocess, sys, json
      def run():
          key = os.environ.get("STRIPE_SECRET_KEY", "")
          cmd = ["stripe"] + sys.argv[1:]
          if key:
              cmd.extend(["--api-key", key])
          result = subprocess.run(cmd, capture_output=True, text=True)
          print(json.dumps({"stdout": result.stdout, "stderr": result.stderr, "code": result.returncode}))
      if __name__ == "__main__":
          run()

  - slug: openai
    display_name: OpenAI
    description: OpenAI API - completions, embeddings, images, files
    category: ai-ml
    tags: [ai, llm, embeddings, gpt]
    openapi_url: https://raw.githubusercontent.com/openai/openai-openapi/master/openapi.yaml
    auth_hint:
      type: bearer_token
      env_var: OPENAI_API_KEY
      docs_url: https://platform.openai.com/docs/api-reference/authentication
    mcp_definition:
      name: openai
      description: Access OpenAI models for completions, embeddings, and image generation
      inputSchema:
        type: object
        properties:
          action:
            type: string
            enum: [chat_completion, create_embedding, generate_image, list_models]
          model:
            type: string
          messages:
            type: array
          params:
            type: object
        required: [action]
    cli_command: null
    cli_wrapper_script: |
      #!/usr/bin/env python
      import os, sys, json, urllib.request
      def run():
          key = os.environ.get("OPENAI_API_KEY", "")
          action = sys.argv[1] if len(sys.argv) > 1 else "models"
          endpoints = {"chat_completion": "/v1/chat/completions", "create_embedding": "/v1/embeddings", "list_models": "/v1/models"}
          url = f"https://api.openai.com{endpoints.get(action, '/v1/models')}"
          payload = json.loads(sys.argv[2]) if len(sys.argv) > 2 else None
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"})
          if payload:
              req.data = json.dumps(payload).encode()
          with urllib.request.urlopen(req) as resp:
              print(resp.read().decode())
      if __name__ == "__main__":
          run()

