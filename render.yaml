services:
  - type: web
    name: translator-middleware
    env: docker
    plan: free
    autoDeploy: true
    preDeployCommand: "alembic upgrade head"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_JWT_ALGORITHM
        value: HS256
      - key: UVICORN_WORKERS
        value: "1"
      - key: ML_ENABLED
        value: "true"
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: AUTH_ISSUER
        sync: false
      - key: AUTH_AUDIENCE
        sync: false
