name: CI and Deploy

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
      CLOUD_RUN_SERVICE: translator-middleware
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      AUTH_JWT_ALGORITHM: HS256
      AUTH_ISSUER: ${{ secrets.AUTH_ISSUER }}
      AUTH_AUDIENCE: ${{ secrets.AUTH_AUDIENCE }}
    steps:
      - uses: actions/checkout@v4
      - name: Check GCP credentials
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "Missing GCP_SA_KEY secret. Add the secret or switch to workload identity."
            exit 1
          fi
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud config set project "$GCP_PROJECT_ID"
      - run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet
      - run: gcloud builds submit --tag "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REPO/translator-middleware:${{ github.sha }}"
      - run: >
          gcloud run deploy "$CLOUD_RUN_SERVICE"
          --image "$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$GCP_ARTIFACT_REPO/translator-middleware:${{ github.sha }}"
          --region "$GCP_REGION"
          --platform managed
          --allow-unauthenticated
          --set-env-vars "DATABASE_URL=$DATABASE_URL,AUTH_JWT_SECRET=$AUTH_JWT_SECRET,AUTH_JWT_ALGORITHM=$AUTH_JWT_ALGORITHM,AUTH_ISSUER=$AUTH_ISSUER,AUTH_AUDIENCE=$AUTH_AUDIENCE"
